build:
  maxIssues: 0
  weights:
    complexity: 2
    formatting: 1
    style: 1
    comments: 1
    bugs: 1

complexity:
  active: true
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 20
    ignoreDeprecated: true
    ignorePrivate: false
  ComplexCondition:
    active: true
    threshold: 4
  LongMethod:
    active: true
    threshold: 60

style:
  active: true
  WildcardImport:
    active: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2']
  ReturnCount:
    active: true
    max: 3
